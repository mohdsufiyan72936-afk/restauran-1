<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RubanCore — Authentic Indian Restaurant. Order online, book a table, explore our menu.">
  <meta name="keywords" content="best restaurant, Indian food, order online, food near me, RubanCore">
  <meta name="theme-color" content="#f97316">
  <title>RubanCore — Taste the Story</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease',
            'slide-up': 'slideUp 0.4s ease',
            'pulse-slow': 'pulse 3s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">

  <style>
    /* ── Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }
    .dark ::-webkit-scrollbar-thumb { background: #374151; }

    /* ── Skeleton ─────────────────────────── */
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .skeleton {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% auto;
      animation: shimmer 1.5s linear infinite;
    }
    .dark .skeleton {
      background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
      background-size: 200% auto;
    }

    /* ── Transitions ──────────────────────── */
    #main-content {
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    /* ── Line clamp ───────────────────────── */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── WhatsApp Float ───────────────────── */
    #whatsapp-float {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 50;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* ── Offer Popup ──────────────────────── */
    #offer-popup {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #offer-popup.hidden {
      transform: scale(0.8);
      opacity: 0;
      pointer-events: none;
    }

    /* ── Modal ────────────────────────────── */
    #item-modal {
      backdrop-filter: blur(4px);
    }
    #modal-content {
      animation: slideUp 0.3s ease;
    }

    /* ── Sidebar mobile ───────────────────── */
    @media (max-width: 767px) {
      #app-sidebar {
        position: fixed;
        top: 64px;
        left: 0;
        bottom: 0;
        z-index: 40;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        width: 260px;
      }
    }

    /* ── Toast container ──────────────────── */
    #toast-container {
      position: fixed;
      top: 80px;
      right: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast-item { pointer-events: auto; }

    /* ── Range input ──────────────────────── */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 99px;
      background: #e5e7eb;
      outline: none;
    }
    .dark input[type="range"] { background: #374151; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f97316;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(249, 115, 22, 0.4);
    }

    /* ── Radio ────────────────────────────── */
    input[type="radio"] {
      accent-color: #f97316;
      width: 14px;
      height: 14px;
    }
  </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 min-h-screen">

  <!-- ── APP SHELL ───────────────────────────────────── -->
 <div id="app" class="flex flex-col min-h-screen">

  <!-- HEADER -->
  <header id="app-header"
    class="sticky top-0 z-40 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-b border-gray-100 dark:border-gray-800 shadow-sm">
  </header>

  <div class="flex flex-1">

    <!-- MOBILE OVERLAY -->
    <div id="sidebar-overlay"
      class="hidden fixed inset-0 bg-black/40 z-30 md:hidden"
      aria-hidden="true">
    </div>

    <!-- SIDEBAR -->
    <aside id="app-sidebar"
      class="
      fixed md:sticky
      top-0 md:top-[64px]
      left-0
      z-40
      h-screen md:h-[calc(100vh-64px)]
      w-[220px]
      bg-white dark:bg-gray-900
      border-r border-gray-100 dark:border-gray-800
      shadow-xl md:shadow-none
      overflow-y-auto
      transition-transform duration-300
      -translate-x-full md:translate-x-0
      ">
    </aside>

    <!-- MAIN -->
    <main class="flex-1 md:ml-0 overflow-y-auto">
      <div id="main-content" class="p-4 md:p-6 max-w-7xl mx-auto">

        <!-- Loading -->
        <div class="flex items-center justify-center py-32">
          <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>

            <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">
              Loading RubanCore...
            </p>
          </div>
        </div>
        

      </div>
      <div id="app-footer"></div>
    </main>

  </div>
</div>

  <!-- ── ITEM DETAIL MODAL ────────────────────────────── -->
  <div id="item-modal"
    class="hidden fixed inset-0 z-50 bg-black/50 items-end sm:items-center justify-center p-0 sm:p-4"
    role="dialog" aria-modal="true" aria-label="Item details">
    <div id="modal-content"
      class="bg-white dark:bg-gray-800 w-full sm:max-w-lg rounded-t-3xl sm:rounded-2xl overflow-hidden shadow-2xl max-h-[90vh] overflow-y-auto">
    </div>
  </div>



  <!-- ── TOAST NOTIFICATIONS ──────────────────────────── -->
  <div id="toast-container" role="region" aria-live="polite" aria-label="Notifications"></div>

  <!-- ── WHATSAPP FLOAT BUTTON ────────────────────────── -->
  <a id="whatsapp-float"
    href="https://wa.me/919999999999?text=Hi!+I'd+like+to+place+an+order+at+RubanCore"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Chat on WhatsApp"
    class="w-14 h-14 bg-green-500 hover:bg-green-600 rounded-full flex items-center justify-center shadow-2xl shadow-green-500/40 transition-colors">
    <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </a>

  <!-- ── OFFER POPUP ───────────────────────────────────── -->
  <div id="offer-popup"
    class="hidden fixed bottom-28 right-6 z-40 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-5 w-72 border border-orange-100 dark:border-gray-700">
    <button id="close-popup"
      class="absolute top-2 right-2 w-7 h-7 flex items-center justify-center rounded-full
      text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-sm font-bold">✕</button>
    <div class="text-2xl mb-2">🎉</div>
    <h4 class="font-black text-gray-900 dark:text-white text-base mb-1">Special Offer!</h4>
    <p class="text-sm text-gray-600 dark:text-gray-400 mb-3">Get 20% off on your first order. Use code:</p>
    <div class="bg-orange-50 dark:bg-orange-900/20 border-2 border-dashed border-orange-300 dark:border-orange-700 rounded-xl px-4 py-2 text-center mb-3">
      <span class="font-black text-orange-600 dark:text-orange-400 text-lg tracking-widest">FEAST20</span>
    </div>
    <button onclick="window.renderRoute('menu');document.getElementById('offer-popup').classList.add('hidden')"
      class="w-full py-2 bg-gradient-to-r from-orange-500 to-rose-500 text-white font-bold rounded-xl text-sm hover:opacity-90 transition-opacity">
      Order Now →
    </button>
  </div>

  <!-- ── SCRIPTS ──────────────────────────────────────── -->
  <script type="module" src="./app.js"></script>

  <script>
    // ── Offer Popup Timer ──────────────────────────────
    setTimeout(() => {
      const popup = document.getElementById('offer-popup');
      if (popup) {
        popup.classList.remove('hidden');
        popup.style.transform = 'scale(1)';
        popup.style.opacity = '1';
      }
    }, 4000);

    document.getElementById('close-popup')?.addEventListener('click', () => {
      document.getElementById('offer-popup')?.classList.add('hidden');
    });

    // ── Service Worker (PWA) ───────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
